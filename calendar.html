<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Jacky Mao — Calendar 2026</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Nunito', sans-serif;
    background: #f0fafa;
    color: #3a5a5e;
    min-height: 100vh;
  }

  /* ---- TOP HEADER ---- */
  .top-bar {
    background: #ffffff;
    border-bottom: 2px solid #c8eceb;
    padding: 14px 28px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    box-shadow: 0 2px 12px rgba(129,216,208,0.15);
    position: sticky;
    top: 0;
    z-index: 100;
  }
  .top-bar .brand {
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .top-bar .cinnamoroll {
    font-size: 36px;
    line-height: 1;
  }
  .top-bar h1 {
    font-size: 20px;
    font-weight: 800;
    color: #5bbab3;
  }
  .top-bar .sub {
    font-size: 11px;
    color: #8ab8b5;
    font-weight: 600;
  }

  .month-nav {
    display: flex;
    align-items: center;
    gap: 14px;
  }
  .month-nav .nav-btn {
    width: 36px;
    height: 36px;
    border-radius: 50%;
    border: 2px solid #c8eceb;
    background: #fff;
    color: #5bbab3;
    font-size: 18px;
    font-weight: 800;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.2s;
    font-family: 'Nunito', sans-serif;
  }
  .month-nav .nav-btn:hover {
    background: #81d8d0;
    color: #fff;
    border-color: #81d8d0;
  }
  .month-nav .mo-label {
    font-size: 22px;
    font-weight: 800;
    color: #5bbab3;
    min-width: 220px;
    text-align: center;
  }
  .month-nav .today-btn {
    padding: 7px 16px;
    border-radius: 20px;
    border: 2px solid #81d8d0;
    background: transparent;
    color: #5bbab3;
    font-size: 12px;
    font-weight: 700;
    cursor: pointer;
    font-family: 'Nunito', sans-serif;
    transition: all 0.2s;
  }
  .month-nav .today-btn:hover {
    background: #81d8d0;
    color: #fff;
  }

  /* ---- LEGEND ---- */
  .legend {
    display: flex;
    gap: 16px;
    padding: 10px 28px;
    background: #ffffff;
    border-bottom: 1px solid #d8f0ef;
    flex-wrap: wrap;
  }
  .legend-item {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 12px;
    font-weight: 600;
    color: #5a8a88;
  }
  .legend-dot {
    width: 12px;
    height: 12px;
    border-radius: 3px;
  }

  /* ---- CALENDAR GRID ---- */
  .cal-wrapper {
    max-width: 1300px;
    margin: 0 auto;
    padding: 20px 24px;
  }

  .wk-header {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    gap: 4px;
    margin-bottom: 4px;
  }
  .wk-header .wh {
    text-align: center;
    font-size: 13px;
    font-weight: 700;
    color: #8ab8b5;
    padding: 8px 4px;
  }
  .wk-header .wh.weekend {
    color: #e8889a;
  }

  .day-grid {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    gap: 4px;
    grid-auto-rows: minmax(120px, 1fr);
  }

  .day-cell {
    background: #fff;
    border-radius: 12px;
    border: 1.5px solid #d8f0ef;
    padding: 6px 8px;
    min-height: 120px;
    cursor: pointer;
    transition: all 0.15s;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    position: relative;
  }
  .day-cell:hover {
    box-shadow: 0 4px 16px rgba(129,216,208,0.25);
    border-color: #81d8d0;
  }
  .day-cell.empty {
    background: transparent;
    border: none;
    cursor: default;
    min-height: 0;
  }
  .day-cell.empty:hover {
    box-shadow: none;
  }
  .day-cell.today {
    border-color: #81d8d0;
    border-width: 2.5px;
    box-shadow: 0 2px 12px rgba(129,216,208,0.3);
  }
  .day-cell.weekend {
    background: #f5fcfb;
    border-color: #f0c0cc;
  }
  .day-cell.past {
    opacity: 0.55;
  }

  .day-num {
    font-size: 13px;
    font-weight: 800;
    color: #8ab8b5;
    margin-bottom: 4px;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  .day-cell.today .day-num {
    color: #5bbab3;
  }
  .day-cell.weekend .day-num {
    color: #e8889a;
  }
  .today-dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: #81d8d0;
  }

  .day-events {
    flex: 1;
    display: flex;
    flex-direction: column;
    gap: 3px;
    overflow-y: auto;
  }
  .day-events::-webkit-scrollbar { width: 3px; }
  .day-events::-webkit-scrollbar-thumb { background: #c8eceb; border-radius: 2px; }

  .evt-chip {
    padding: 4px 8px;
    border-radius: 6px;
    font-size: 11.5px;
    font-weight: 800;
    color: #fff;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    line-height: 1.4;
    text-shadow: 0 1px 2px rgba(0,0,0,0.15);
  }
  .evt-chip .evt-time {
    font-weight: 600;
    font-size: 10px;
    opacity: 0.85;
  }

  .more-events {
    font-size: 10px;
    font-weight: 700;
    color: #8ab8b5;
    padding: 2px 0;
    text-align: center;
  }

  /* category colors — bold and readable */
  .cat-business  { background: #2563eb; }
  .cat-personal  { background: #0d9488; }
  .cat-wedding   { background: #c026d3; }
  .cat-movein    { background: #ea580c; }
  .cat-deadline  { background: #dc2626; }
  .cat-other     { background: #64748b; }

  /* ---- ADD BUTTON ---- */
  .add-day-btn {
    position: absolute;
    bottom: 4px;
    right: 4px;
    width: 22px;
    height: 22px;
    border-radius: 50%;
    border: none;
    background: #d8f0ef;
    color: #5bbab3;
    font-size: 16px;
    font-weight: 800;
    cursor: pointer;
    display: none;
    align-items: center;
    justify-content: center;
    line-height: 1;
    transition: all 0.15s;
    font-family: 'Nunito', sans-serif;
  }
  .day-cell:hover .add-day-btn {
    display: flex;
  }
  .add-day-btn:hover {
    background: #81d8d0;
    color: #fff;
  }

  /* ---- MODAL / SIDE PANEL ---- */
  .overlay {
    display: none;
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    background: rgba(58,90,94,0.3);
    z-index: 200;
    justify-content: flex-end;
  }
  .overlay.open {
    display: flex;
  }

  .side-panel {
    width: 420px;
    max-width: 90vw;
    background: #fff;
    height: 100vh;
    overflow-y: auto;
    box-shadow: -4px 0 24px rgba(129,216,208,0.2);
    display: flex;
    flex-direction: column;
  }

  .panel-header {
    padding: 20px 22px;
    border-bottom: 2px solid #d8f0ef;
    display: flex;
    justify-content: space-between;
    align-items: center;
    background: linear-gradient(135deg, #f0fafa 0%, #fff 100%);
  }
  .panel-header h2 {
    font-size: 18px;
    font-weight: 800;
    color: #5bbab3;
  }
  .panel-close {
    width: 32px;
    height: 32px;
    border-radius: 50%;
    border: none;
    background: #d8f0ef;
    color: #5bbab3;
    font-size: 18px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Nunito', sans-serif;
    font-weight: 700;
  }
  .panel-close:hover {
    background: #81d8d0;
    color: #fff;
  }

  .panel-body {
    flex: 1;
    padding: 20px 22px;
    overflow-y: auto;
  }

  .existing-events {
    margin-bottom: 20px;
  }
  .existing-events h3 {
    font-size: 13px;
    color: #5bbab3;
    text-transform: uppercase;
    letter-spacing: 1px;
    font-weight: 700;
    margin-bottom: 10px;
  }
  .no-events {
    font-size: 13px;
    color: #8ab8b5;
    font-style: italic;
    padding: 10px 0;
  }

  .event-card {
    background: #f5fcfb;
    border-radius: 12px;
    padding: 12px 14px;
    border: 1.5px solid #d8f0ef;
    margin-bottom: 8px;
    position: relative;
  }
  .event-card .ec-cat {
    display: inline-block;
    padding: 2px 8px;
    border-radius: 10px;
    font-size: 10px;
    font-weight: 700;
    color: #fff;
    margin-bottom: 6px;
  }
  .event-card .ec-title {
    font-size: 15px;
    font-weight: 700;
    color: #3a5a5e;
    margin-bottom: 3px;
  }
  .event-card .ec-time {
    font-size: 12px;
    color: #8ab8b5;
    font-weight: 600;
    margin-bottom: 4px;
  }
  .event-card .ec-notes {
    font-size: 13px;
    color: #5a7a7e;
    line-height: 1.5;
    white-space: pre-wrap;
  }
  .event-card .ec-actions {
    position: absolute;
    top: 10px;
    right: 10px;
    display: flex;
    gap: 6px;
  }
  .ec-btn {
    width: 26px;
    height: 26px;
    border-radius: 50%;
    border: 1.5px solid #d8f0ef;
    background: #fff;
    color: #8ab8b5;
    font-size: 13px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.15s;
    font-family: 'Nunito', sans-serif;
  }
  .ec-btn:hover {
    background: #81d8d0;
    color: #fff;
    border-color: #81d8d0;
  }
  .ec-btn.del:hover {
    background: #e06060;
    border-color: #e06060;
  }

  /* ---- FORM ---- */
  .form-section h3 {
    font-size: 13px;
    color: #5bbab3;
    text-transform: uppercase;
    letter-spacing: 1px;
    font-weight: 700;
    margin-bottom: 12px;
  }

  .form-group {
    margin-bottom: 14px;
  }
  .form-group label {
    display: block;
    font-size: 12px;
    font-weight: 700;
    color: #5a8a88;
    margin-bottom: 5px;
  }
  .form-group input,
  .form-group select,
  .form-group textarea {
    width: 100%;
    padding: 10px 12px;
    border-radius: 10px;
    border: 1.5px solid #d8f0ef;
    background: #f5fcfb;
    color: #3a5a5e;
    font-size: 14px;
    font-family: 'Nunito', sans-serif;
    font-weight: 600;
    transition: border-color 0.2s;
  }
  .form-group input:focus,
  .form-group select:focus,
  .form-group textarea:focus {
    outline: none;
    border-color: #81d8d0;
    box-shadow: 0 0 0 3px rgba(129,216,208,0.15);
  }
  .form-group textarea {
    min-height: 100px;
    resize: vertical;
    line-height: 1.5;
  }

  .cat-picker {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
  }
  .cat-btn {
    padding: 7px 14px;
    border-radius: 20px;
    border: 2px solid transparent;
    cursor: pointer;
    font-size: 12px;
    font-weight: 700;
    transition: all 0.2s;
    background: #f5fcfb;
    font-family: 'Nunito', sans-serif;
  }
  .cat-btn:hover { transform: scale(1.06); }
  .cat-btn[data-cat="business"]  { border-color: #2563eb; color: #2563eb; }
  .cat-btn[data-cat="business"].on  { background: #2563eb; color: #fff; }
  .cat-btn[data-cat="personal"]  { border-color: #0d9488; color: #0d9488; }
  .cat-btn[data-cat="personal"].on  { background: #0d9488; color: #fff; }
  .cat-btn[data-cat="wedding"]   { border-color: #c026d3; color: #c026d3; }
  .cat-btn[data-cat="wedding"].on   { background: #c026d3; color: #fff; }
  .cat-btn[data-cat="movein"]    { border-color: #ea580c; color: #ea580c; }
  .cat-btn[data-cat="movein"].on    { background: #ea580c; color: #fff; }
  .cat-btn[data-cat="deadline"]  { border-color: #dc2626; color: #dc2626; }
  .cat-btn[data-cat="deadline"].on  { background: #dc2626; color: #fff; }
  .cat-btn[data-cat="other"]     { border-color: #64748b; color: #64748b; }
  .cat-btn[data-cat="other"].on     { background: #64748b; color: #fff; }

  .form-actions {
    display: flex;
    gap: 10px;
    margin-top: 18px;
  }
  .btn-save {
    flex: 1;
    padding: 12px;
    border-radius: 12px;
    border: none;
    background: #81d8d0;
    color: #fff;
    font-size: 14px;
    font-weight: 700;
    cursor: pointer;
    font-family: 'Nunito', sans-serif;
    transition: all 0.2s;
  }
  .btn-save:hover {
    background: #5bbab3;
  }
  .btn-cancel {
    padding: 12px 20px;
    border-radius: 12px;
    border: 2px solid #d8f0ef;
    background: #fff;
    color: #5a8a88;
    font-size: 14px;
    font-weight: 700;
    cursor: pointer;
    font-family: 'Nunito', sans-serif;
    transition: all 0.2s;
  }
  .btn-cancel:hover {
    background: #f5fcfb;
  }

  /* ---- SYNC STATUS ---- */
  .sync-status {
    font-size: 11px;
    font-weight: 600;
    padding: 4px 12px;
    border-radius: 12px;
    background: #e0f5f3;
    color: #5bbab3;
  }
  .sync-status.saving {
    background: #fff3e0;
    color: #e8a850;
  }
  .sync-status.error {
    background: #fce8e8;
    color: #e06060;
  }

  /* ---- RESPONSIVE ---- */
  @media (max-width: 900px) {
    .day-grid { grid-auto-rows: minmax(90px, 1fr); }
    .day-cell { padding: 4px 6px; min-height: 90px; }
    .side-panel { width: 100vw; }
    .month-nav .mo-label { font-size: 18px; min-width: 180px; }
  }
  @media (max-width: 600px) {
    .top-bar { flex-direction: column; gap: 10px; padding: 12px 16px; }
    .legend { padding: 8px 16px; gap: 10px; }
    .cal-wrapper { padding: 10px 8px; }
    .day-grid { grid-auto-rows: minmax(70px, 1fr); gap: 2px; }
    .day-cell { border-radius: 8px; min-height: 70px; }
    .evt-chip { font-size: 10px; padding: 2px 5px; }
  }
</style>
</head>
<body>

<!-- TOP BAR -->
<div class="top-bar">
  <div class="brand">
    <span class="cinnamoroll">&#x1F43E;</span>
    <div>
      <h1>Jacky Mao — Calendar</h1>
      <div class="sub">Prepared by Theeban Siva</div>
    </div>
  </div>
  <div class="month-nav">
    <span class="sync-status" id="syncStatus">Synced</span>
    <button class="today-btn" id="todayBtn">Today</button>
    <button class="nav-btn" id="prevBtn">&#8249;</button>
    <span class="mo-label" id="moLabel">April 2026</span>
    <button class="nav-btn" id="nextBtn">&#8250;</button>
  </div>
</div>

<!-- LEGEND -->
<div class="legend">
  <div class="legend-item"><div class="legend-dot cat-business"></div> Business</div>
  <div class="legend-item"><div class="legend-dot cat-personal"></div> Personal</div>
  <div class="legend-item"><div class="legend-dot cat-wedding"></div> Wedding</div>
  <div class="legend-item"><div class="legend-dot cat-movein"></div> Move-in</div>
  <div class="legend-item"><div class="legend-dot cat-deadline"></div> Deadline</div>
  <div class="legend-item"><div class="legend-dot cat-other"></div> Other</div>
</div>

<!-- CALENDAR -->
<div class="cal-wrapper">
  <div class="wk-header">
    <span class="wh">Monday</span>
    <span class="wh">Tuesday</span>
    <span class="wh">Wednesday</span>
    <span class="wh">Thursday</span>
    <span class="wh">Friday</span>
    <span class="wh weekend">Saturday</span>
    <span class="wh weekend">Sunday</span>
  </div>
  <div class="day-grid" id="dayGrid"></div>
</div>

<!-- SIDE PANEL OVERLAY -->
<div class="overlay" id="overlay">
  <div class="side-panel">
    <div class="panel-header">
      <h2 id="panelDate">April 10, 2026</h2>
      <button class="panel-close" id="panelClose">&#10005;</button>
    </div>
    <div class="panel-body">
      <div class="existing-events" id="existingEvents">
        <h3>Events</h3>
        <div id="eventsList"></div>
      </div>
      <div class="form-section" id="formSection">
        <h3 id="formTitle">Add Event</h3>
        <input type="hidden" id="editId" value="">
        <div class="form-group">
          <label>Title</label>
          <input type="text" id="evtTitle" placeholder="e.g. Dinner at Nobu">
        </div>
        <div class="form-group">
          <label>Time (optional)</label>
          <div style="display:flex;gap:8px;align-items:center;">
            <input type="time" id="evtStart" style="flex:1">
            <span style="color:#8ab8b5;font-weight:700;">to</span>
            <input type="time" id="evtEnd" style="flex:1">
          </div>
        </div>
        <div class="form-group">
          <label>Category</label>
          <div class="cat-picker" id="catPicker">
            <button class="cat-btn on" data-cat="personal">Personal</button>
            <button class="cat-btn" data-cat="business">Business</button>
            <button class="cat-btn" data-cat="wedding">Wedding</button>
            <button class="cat-btn" data-cat="movein">Move-in</button>
            <button class="cat-btn" data-cat="deadline">Deadline</button>
            <button class="cat-btn" data-cat="other">Other</button>
          </div>
        </div>
        <div class="form-group">
          <label>Notes</label>
          <textarea id="evtNotes" placeholder="Add details, addresses, links..."></textarea>
        </div>
        <div class="form-actions">
          <button class="btn-save" id="btnSave">Save Event</button>
          <button class="btn-cancel" id="btnCancel">Cancel</button>
        </div>
      </div>
    </div>
  </div>
</div>

<script>
(function(){
  // ============================================
  // CONFIG — Replace with your Apps Script URL
  // ============================================
  var API = 'https://script.google.com/macros/s/AKfycbyLL8HJr1E9t1W2FEasK3B8hsXAK9Wc67HtLf-fgnHVd9Mvrk5IE7oDIuzit4bkCSxU/exec';

  var MONTHS = ['January','February','March','April','May','June','July','August','September','October','November','December'];
  var CAT_LABELS = {
    business: 'Business',
    personal: 'Personal',
    wedding: 'Wedding',
    movein: 'Move-in',
    deadline: 'Deadline',
    other: 'Other'
  };

  var curYear = 2026;
  var curMonth = new Date().getMonth();
  var events = {};
  var selectedDate = null;
  var selectedCat = 'personal';
  var saveTimer = null;
  var idCounter = Date.now();

  function init(){
    loadLocal();
    renderMonth();
    bindNav();
    bindPanel();
    cloudLoad();
  }

  // ---- NAVIGATION ----
  function bindNav(){
    document.getElementById('prevBtn').onclick = function(){
      curMonth--;
      if(curMonth < 0){ curMonth = 11; curYear--; }
      renderMonth();
    };
    document.getElementById('nextBtn').onclick = function(){
      curMonth++;
      if(curMonth > 11){ curMonth = 0; curYear++; }
      renderMonth();
    };
    document.getElementById('todayBtn').onclick = function(){
      var now = new Date();
      curMonth = now.getMonth();
      curYear = now.getFullYear();
      renderMonth();
    };
  }

  // ---- RENDER MONTH ----
  function renderMonth(){
    document.getElementById('moLabel').textContent = MONTHS[curMonth] + ' ' + curYear;
    var grid = document.getElementById('dayGrid');
    grid.innerHTML = '';

    var firstDay = new Date(curYear, curMonth, 1);
    var startDow = (firstDay.getDay() + 6) % 7;
    var daysInMonth = new Date(curYear, curMonth + 1, 0).getDate();
    var today = new Date();
    var todayStr = fmtDate(today.getFullYear(), today.getMonth(), today.getDate());

    for(var i = 0; i < startDow; i++){
      var empty = document.createElement('div');
      empty.className = 'day-cell empty';
      grid.appendChild(empty);
    }

    for(var d = 1; d <= daysInMonth; d++){
      var cell = document.createElement('div');
      var dateStr = fmtDate(curYear, curMonth, d);
      var dow = (startDow + d - 1) % 7;
      var isWeekend = (dow >= 5);
      var isToday = (dateStr === todayStr);
      var isPast = new Date(curYear, curMonth, d) < new Date(today.getFullYear(), today.getMonth(), today.getDate());

      cell.className = 'day-cell';
      if(isWeekend) cell.classList.add('weekend');
      if(isToday) cell.classList.add('today');
      if(isPast && !isToday) cell.classList.add('past');
      cell.setAttribute('data-date', dateStr);

      var numDiv = document.createElement('div');
      numDiv.className = 'day-num';
      var numSpan = document.createElement('span');
      numSpan.textContent = d;
      numDiv.appendChild(numSpan);
      if(isToday){
        var dot = document.createElement('span');
        dot.className = 'today-dot';
        numDiv.appendChild(dot);
      }
      cell.appendChild(numDiv);

      var dayEvts = events[dateStr] || [];
      var evtsDiv = document.createElement('div');
      evtsDiv.className = 'day-events';

      var maxShow = 3;
      for(var e = 0; e < Math.min(dayEvts.length, maxShow); e++){
        var chip = document.createElement('div');
        chip.className = 'evt-chip cat-' + dayEvts[e].cat;
        var chipText = '';
        if(dayEvts[e].start) chipText = dayEvts[e].start + ' ';
        chipText += dayEvts[e].title;
        chip.textContent = chipText;
        chip.title = dayEvts[e].title + (dayEvts[e].notes ? '\n' + dayEvts[e].notes : '');
        evtsDiv.appendChild(chip);
      }
      if(dayEvts.length > maxShow){
        var more = document.createElement('div');
        more.className = 'more-events';
        more.textContent = '+' + (dayEvts.length - maxShow) + ' more';
        evtsDiv.appendChild(more);
      }

      cell.appendChild(evtsDiv);

      var addBtn = document.createElement('button');
      addBtn.className = 'add-day-btn';
      addBtn.textContent = '+';
      addBtn.title = 'Add event';
      (function(ds, btn){
        btn.onclick = function(ev){
          ev.stopPropagation();
          openPanel(ds, true);
        };
      })(dateStr, addBtn);
      cell.appendChild(addBtn);

      (function(ds){
        cell.onclick = function(){
          openPanel(ds, false);
        };
      })(dateStr);

      grid.appendChild(cell);
    }
  }

  // ---- SIDE PANEL ----
  function bindPanel(){
    document.getElementById('panelClose').onclick = closePanel;
    document.getElementById('overlay').onclick = function(e){
      if(e.target === this) closePanel();
    };
    document.getElementById('btnCancel').onclick = resetForm;
    document.getElementById('btnSave').onclick = saveEvent;

    var catBtns = document.querySelectorAll('.cat-btn');
    for(var i = 0; i < catBtns.length; i++){
      (function(btn){
        btn.onclick = function(){
          for(var j = 0; j < catBtns.length; j++) catBtns[j].classList.remove('on');
          btn.classList.add('on');
          selectedCat = btn.getAttribute('data-cat');
        };
      })(catBtns[i]);
    }

    document.addEventListener('keydown', function(e){
      if(e.key === 'Escape') closePanel();
    });
  }

  function openPanel(dateStr, focusForm){
    selectedDate = dateStr;
    var d = parseDate(dateStr);
    document.getElementById('panelDate').textContent = MONTHS[d.getMonth()] + ' ' + d.getDate() + ', ' + d.getFullYear();

    // Show day of week
    var days = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
    document.getElementById('panelDate').textContent = days[d.getDay()] + ', ' + MONTHS[d.getMonth()] + ' ' + d.getDate() + ', ' + d.getFullYear();

    renderEventsList();
    resetForm();
    document.getElementById('overlay').classList.add('open');
    if(focusForm){
      setTimeout(function(){ document.getElementById('evtTitle').focus(); }, 100);
    }
  }

  function closePanel(){
    document.getElementById('overlay').classList.remove('open');
    selectedDate = null;
  }

  function renderEventsList(){
    var list = document.getElementById('eventsList');
    list.innerHTML = '';
    var dayEvts = events[selectedDate] || [];

    if(dayEvts.length === 0){
      list.innerHTML = '<div class="no-events">No events yet — add one below</div>';
      return;
    }

    dayEvts.sort(function(a,b){
      if(!a.start) return 1;
      if(!b.start) return -1;
      return a.start.localeCompare(b.start);
    });

    for(var i = 0; i < dayEvts.length; i++){
      var ev = dayEvts[i];
      var card = document.createElement('div');
      card.className = 'event-card';

      var catBadge = document.createElement('span');
      catBadge.className = 'ec-cat cat-' + ev.cat;
      catBadge.textContent = CAT_LABELS[ev.cat] || ev.cat;
      card.appendChild(catBadge);

      var title = document.createElement('div');
      title.className = 'ec-title';
      title.textContent = ev.title;
      card.appendChild(title);

      if(ev.start || ev.end){
        var time = document.createElement('div');
        time.className = 'ec-time';
        var t = '';
        if(ev.start) t += formatTime(ev.start);
        if(ev.start && ev.end) t += ' — ';
        if(ev.end) t += formatTime(ev.end);
        time.textContent = t;
        card.appendChild(time);
      }

      if(ev.notes){
        var notes = document.createElement('div');
        notes.className = 'ec-notes';
        notes.textContent = ev.notes;
        card.appendChild(notes);
      }

      var actions = document.createElement('div');
      actions.className = 'ec-actions';

      var editBtn = document.createElement('button');
      editBtn.className = 'ec-btn';
      editBtn.innerHTML = '&#9998;';
      editBtn.title = 'Edit';

      var delBtn = document.createElement('button');
      delBtn.className = 'ec-btn del';
      delBtn.innerHTML = '&#10005;';
      delBtn.title = 'Delete';

      (function(evt){
        editBtn.onclick = function(e){
          e.stopPropagation();
          editEvent(evt);
        };
        delBtn.onclick = function(e){
          e.stopPropagation();
          deleteEvent(evt.id);
        };
      })(ev);

      actions.appendChild(editBtn);
      actions.appendChild(delBtn);
      card.appendChild(actions);
      list.appendChild(card);
    }
  }

  function resetForm(){
    document.getElementById('editId').value = '';
    document.getElementById('evtTitle').value = '';
    document.getElementById('evtStart').value = '';
    document.getElementById('evtEnd').value = '';
    document.getElementById('evtNotes').value = '';
    document.getElementById('formTitle').textContent = 'Add Event';
    selectedCat = 'personal';
    var catBtns = document.querySelectorAll('.cat-btn');
    for(var i = 0; i < catBtns.length; i++){
      catBtns[i].classList.remove('on');
      if(catBtns[i].getAttribute('data-cat') === 'personal') catBtns[i].classList.add('on');
    }
  }

  function editEvent(evt){
    document.getElementById('editId').value = evt.id;
    document.getElementById('evtTitle').value = evt.title;
    document.getElementById('evtStart').value = evt.start || '';
    document.getElementById('evtEnd').value = evt.end || '';
    document.getElementById('evtNotes').value = evt.notes || '';
    document.getElementById('formTitle').textContent = 'Edit Event';
    selectedCat = evt.cat;
    var catBtns = document.querySelectorAll('.cat-btn');
    for(var i = 0; i < catBtns.length; i++){
      catBtns[i].classList.remove('on');
      if(catBtns[i].getAttribute('data-cat') === evt.cat) catBtns[i].classList.add('on');
    }
    document.getElementById('evtTitle').focus();
  }

  function saveEvent(){
    var title = document.getElementById('evtTitle').value.trim();
    if(!title){
      document.getElementById('evtTitle').style.borderColor = '#e06060';
      document.getElementById('evtTitle').focus();
      return;
    }
    document.getElementById('evtTitle').style.borderColor = '#d8f0ef';

    var editId = document.getElementById('editId').value;
    var start = document.getElementById('evtStart').value;
    var end = document.getElementById('evtEnd').value;
    var notes = document.getElementById('evtNotes').value.trim();

    if(!events[selectedDate]) events[selectedDate] = [];

    if(editId){
      var arr = events[selectedDate];
      for(var i = 0; i < arr.length; i++){
        if(String(arr[i].id) === String(editId)){
          arr[i].title = title;
          arr[i].start = start;
          arr[i].end = end;
          arr[i].cat = selectedCat;
          arr[i].notes = notes;
          break;
        }
      }
    } else {
      events[selectedDate].push({
        id: ++idCounter,
        title: title,
        start: start,
        end: end,
        cat: selectedCat,
        notes: notes
      });
    }

    saveLocal();
    scheduleSave();
    renderEventsList();
    renderMonth();
    resetForm();
  }

  function deleteEvent(id){
    if(!confirm('Delete this event?')) return;
    var arr = events[selectedDate] || [];
    events[selectedDate] = arr.filter(function(e){ return e.id !== id; });
    if(events[selectedDate].length === 0) delete events[selectedDate];
    saveLocal();
    scheduleSave();
    renderEventsList();
    renderMonth();
  }

  // ---- LOCAL STORAGE ----
  function saveLocal(){
    try { localStorage.setItem('jm-cal-26', JSON.stringify(events)); } catch(e){}
  }

  function loadLocal(){
    try {
      var s = localStorage.getItem('jm-cal-26');
      if(s) events = JSON.parse(s);
    } catch(e){
      events = {};
    }
  }

  // ---- CLOUD SYNC ----
  function scheduleSave(){
    if(saveTimer) clearTimeout(saveTimer);
    saveTimer = setTimeout(cloudSave, 2000);
  }

  function setSyncStatus(status){
    var el = document.getElementById('syncStatus');
    el.className = 'sync-status';
    if(status === 'saving'){
      el.textContent = 'Saving...';
      el.classList.add('saving');
    } else if(status === 'error'){
      el.textContent = 'Sync error';
      el.classList.add('error');
    } else {
      el.textContent = 'Synced';
    }
  }

  function cloudSave(){
    if(!API) return;
    setSyncStatus('saving');
    try {
      var xhr = new XMLHttpRequest();
      xhr.open('POST', API, true);
      xhr.setRequestHeader('Content-Type', 'text/plain');
      xhr.onload = function(){
        if(xhr.status === 200) setSyncStatus('synced');
        else setSyncStatus('error');
      };
      xhr.onerror = function(){ setSyncStatus('error'); };
      xhr.send(JSON.stringify({ action: 'bulk', events: events }));
    } catch(e){ setSyncStatus('error'); }
  }

  function cloudLoad(){
    if(!API) return;
    try {
      var xhr = new XMLHttpRequest();
      xhr.open('GET', API, true);
      xhr.onload = function(){
        if(xhr.status === 200){
          try {
            var resp = JSON.parse(xhr.responseText);
            if(resp.success && resp.events){
              var keys = Object.keys(resp.events);
              if(keys.length > 0){
                events = resp.events;
                localStorage.setItem('jm-cal-26', JSON.stringify(events));
                renderMonth();
                for(var k in events){
                  var arr = events[k];
                  for(var i = 0; i < arr.length; i++){
                    if(arr[i].id >= idCounter) idCounter = arr[i].id + 1;
                  }
                }
              }
              setSyncStatus('synced');
            }
          } catch(e){}
        }
      };
      xhr.send();
    } catch(e){}
  }

  // ---- HELPERS ----
  function fmtDate(y, m, d){
    return y + '-' + pad(m + 1) + '-' + pad(d);
  }

  function pad(n){
    return n < 10 ? '0' + n : '' + n;
  }

  function parseDate(str){
    var p = str.split('-');
    return new Date(parseInt(p[0]), parseInt(p[1]) - 1, parseInt(p[2]));
  }

  function formatTime(t){
    if(!t) return '';
    var parts = t.split(':');
    var h = parseInt(parts[0]);
    var m = parts[1];
    var ampm = h >= 12 ? 'PM' : 'AM';
    if(h === 0) h = 12;
    else if(h > 12) h -= 12;
    return h + ':' + m + ' ' + ampm;
  }

  init();
})();
</script>
