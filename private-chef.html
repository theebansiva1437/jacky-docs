async function unlock() {
  const pwd = document.getElementById('pwd').value;
  const inp = document.getElementById('pwd');
  try {
    const enc = new TextEncoder();
    const keyMaterial = await crypto.subtle.importKey('raw', enc.encode(pwd), 'PBKDF2', false, ['deriveKey']);
    const salt = new Uint8Array(ENCRYPTED.salt);
    const key = await crypto.subtle.deriveKey(
      { name: 'PBKDF2', salt, iterations: 100000, hash: 'SHA-256' },
      keyMaterial,
      { name: 'AES-GCM', length: 256 },
      false,
      ['decrypt']
    );
    const iv = new Uint8Array(ENCRYPTED.iv);
    const data = new Uint8Array(ENCRYPTED.data);
    const decrypted = await crypto.subtle.decrypt({ name: 'AES-GCM', iv }, key, data);
    const html = new TextDecoder().decode(decrypted);
    document.getElementById('lock-screen').style.display = 'none';
    const content = document.getElementById('content');
    content.style.display = 'block';
    content.innerHTML = html;
    // Re-run scripts inside decrypted content
    content.querySelectorAll('script').forEach(s => {
      const ns = document.createElement('script');
      ns.text = s.text;
      document.head.appendChild(ns);
    });
  } catch(e) {
    inp.classList.add('error');
    document.getElementById('err').textContent = 'Incorrect password. Try again.';
    setTimeout(() => inp.classList.remove('error'), 400);
  }
